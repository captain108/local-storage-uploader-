{% extends "base.html" %}
{% block title %}Login - Captain Uploader{% endblock %}
{% block content %}
<form method="POST" action="{{ url_for('auth.login') }}">
    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="your@email.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn" style="width:100%;">Log In</button>
</form>
<div class="flex mt-20">
    <a href="{{ url_for('auth.google_login') }}" class="btn btn-google">
        <i class="fab fa-google"></i> Sign in with Google
    </a>
    <a href="{{ url_for('auth.register') }}" class="btn" style="background:transparent;border:1px solid #f0c040;color:#f0c040;">Sign Up</a>
</div>
{% endblock %}
