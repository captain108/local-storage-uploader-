<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captain Uploader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(145deg, #0b0c1a, #1a1d2e);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius:40px;
            padding:40px 30px;
            width:100%;
            max-width:640px;
            box-shadow:0 25px 50px rgba(0,0,0,0.7);
            border:1px solid rgba(255,255,255,0.1);
        }
        .banner { text-align:center; margin-bottom:30px; }
        .banner i {
            font-size:60px;
            color:#f0c040;
            background:rgba(240,192,64,0.15);
            padding:15px;
            border-radius:50%;
            margin-bottom:10px;
        }
        .banner h1 { color:#fff; font-size:28px; letter-spacing:2px; font-weight:700; }
        .banner h1 span { color:#f0c040; }
        .banner p { color:#aaa; font-size:14px; margin-top:5px; }
        .upload-area {
            border:2px dashed rgba(255,255,255,0.2);
            border-radius:20px;
            padding:25px;
            text-align:center;
            transition:0.3s;
            cursor:pointer;
            background:rgba(255,255,255,0.03);
        }
        .upload-area:hover { border-color:#f0c040; background:rgba(240,192,64,0.05); }
        .upload-area i { font-size:48px; color:#f0c040; margin-bottom:10px; }
        .upload-area p { color:#ccc; font-size:16px; }
        .upload-area input[type="file"] { display:none; }
        #file-name { color:#f0c040; font-weight:600; margin-top:8px; font-size:14px; word-break:break-all; }
        #upload-btn {
            width:100%;
            padding:14px;
            margin-top:20px;
            background:#f0c040;
            border:none;
            border-radius:50px;
            font-size:18px;
            font-weight:700;
            color:#1a1d2e;
            cursor:pointer;
            transition:0.3s;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
        }
        #upload-btn:hover { background:#e0b030; transform:scale(1.02); }
        #upload-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
        .progress-container { margin-top:25px; display:none; }
        .progress-bar-bg { width:100%; height:12px; background:#2a2d44; border-radius:20px; overflow:hidden; }
        .progress-bar-fill { height:100%; width:0%; background:linear-gradient(90deg, #f0c040, #f5d76e); border-radius:20px; transition:width 0.15s ease; }
        .stats {
            display:flex;
            justify-content:space-between;
            color:#bbb;
            font-size:14px;
            margin-top:10px;
            flex-wrap:wrap;
            gap:5px;
        }
        .stats span i { margin-right:5px; color:#f0c040; }
        .multi-options {
            margin-top:20px;
            display:flex;
            justify-content:space-around;
            color:#ccc;
            font-size:13px;
            border-top:1px solid rgba(255,255,255,0.05);
            padding-top:15px;
            flex-wrap:wrap;
            gap:10px;
        }
        .multi-options label { display:flex; align-items:center; gap:6px; cursor:pointer; }
        .multi-options input[type="checkbox"] { accent-color:#f0c040; width:16px; height:16px; }
        .status-msg { color:#6fcf97; font-size:14px; margin-top:12px; text-align:center; display:none; }
        .footer { text-align:center; margin-top:25px; color:#555; font-size:12px; }
        .footer i { color:#f0c040; }
    </style>
</head>
<body>
<div class="card">
    <!-- BANNER -->
    <div class="banner">
        <i class="fas fa-crown"></i>
        <h1>Captain <span>Uploader</span></h1>
        <p><i class="fas fa-code"></i> Developer Edition · Multi‑coosable</p>
    </div>

    <!-- UPLOAD AREA -->
    <div class="upload-area" id="drop-area">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Click or drag & drop files here</p>
        <input type="file" id="file-input" name="file" multiple>
        <div id="file-name">No file chosen</div>
    </div>

    <!-- MULTI OPTIONS (sends states to backend) -->
    <div class="multi-options">
        <label><input type="checkbox" id="opt-telegram" checked> Send to Telegram</label>
        <label><input type="checkbox" id="opt-save" checked> Save locally</label>
        <label><input type="checkbox" id="opt-notify"> Notify on completion</label>
    </div>

    <!-- UPLOAD BUTTON -->
    <button id="upload-btn"><i class="fas fa-upload"></i> Upload Now</button>

    <!-- PROGRESS & STATS -->
    <div class="progress-container" id="progress-container">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
        <div class="stats">
            <span><i class="fas fa-percent"></i> <span id="percent">0</span>%</span>
            <span><i class="fas fa-tachometer-alt"></i> <span id="speed">0</span> KB/s</span>
            <span><i class="fas fa-clock"></i> <span id="time">0</span>s</span>
        </div>
    </div>

    <div class="status-msg" id="status-msg"><i class="fas fa-check-circle"></i> Upload complete!</div>
    <div class="footer">Made with <i class="fas fa-heart"></i> by Captain · v2.0</div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const fileName = document.getElementById('file-name');
    const uploadBtn = document.getElementById('upload-btn');
    const progressContainer = document.getElementById('progress-container');
    const progressFill = document.getElementById('progress-fill');
    const percentSpan = document.getElementById('percent');
    const speedSpan = document.getElementById('speed');
    const timeSpan = document.getElementById('time');
    const statusMsg = document.getElementById('status-msg');
    const dropArea = document.getElementById('drop-area');

    let speedInterval = null;

    // Show selected file names
    fileInput.addEventListener('change', function() {
        if (this.files.length > 0) {
            const names = Array.from(this.files).map(f => f.name).join(', ');
            fileName.textContent = names.length > 50 ? names.substring(0,50)+'…' : names;
        } else {
            fileName.textContent = 'No file chosen';
        }
    });

    // Drag & drop
    dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.style.borderColor = '#f0c040'; });
    dropArea.addEventListener('dragleave', () => { dropArea.style.borderColor = 'rgba(255,255,255,0.2)'; });
    dropArea.addEventListener('drop', (e) => {
        e.preventDefault();
        dropArea.style.borderColor = 'rgba(255,255,255,0.2)';
        if (e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            fileName.textContent = Array.from(e.dataTransfer.files).map(f => f.name).join(', ');
        }
    });
    dropArea.addEventListener('click', () => fileInput.click());

    // Upload logic
    uploadBtn.addEventListener('click', function() {
        if (fileInput.files.length === 0) {
            alert('Please select at least one file.');
            return;
        }

        // Reset UI
        statusMsg.style.display = 'none';
        progressContainer.style.display = 'block';
        progressFill.style.width = '0%';
        percentSpan.textContent = '0';
        speedSpan.textContent = '0 KB/s';
        timeSpan.textContent = '0s';
        uploadBtn.disabled = true;

        const files = fileInput.files;
        const totalSize = Array.from(files).reduce((acc, f) => acc + f.size, 0);
        let uploadedBytes = 0;
        const startTime = Date.now();

        // Speed updater (every 500ms)
        if (speedInterval) clearInterval(speedInterval);
        speedInterval = setInterval(() => {
            const elapsed = (Date.now() - startTime) / 1000;
            if (elapsed > 0) {
                const speed = (uploadedBytes / 1024) / elapsed;
                speedSpan.textContent = speed.toFixed(1) + ' KB/s';
            }
            const totalPercent = totalSize > 0 ? Math.min(100, (uploadedBytes / totalSize) * 100) : 0;
            percentSpan.textContent = Math.round(totalPercent);
            progressFill.style.width = Math.round(totalPercent) + '%';
            timeSpan.textContent = Math.round(elapsed) + 's';
        }, 500);

        // Build FormData (files + options)
        const formData = new FormData();
        for (let i = 0; i < files.length; i++) {
            formData.append('file', files[i]);
        }
        formData.append('opt-telegram', document.getElementById('opt-telegram').checked ? 'on' : 'off');
        formData.append('opt-save', document.getElementById('opt-save').checked ? 'on' : 'off');
        formData.append('opt-notify', document.getElementById('opt-notify').checked ? 'on' : 'off');

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/upload', true);

        xhr.upload.addEventListener('progress', function(e) {
            if (e.lengthComputable) {
                uploadedBytes = e.loaded;
            }
        });

        xhr.onload = function() {
            clearInterval(speedInterval);
            progressFill.style.width = '100%';
            percentSpan.textContent = '100';
            uploadBtn.disabled = false;
            if (xhr.status === 200) {
                statusMsg.textContent = '✅ Upload successful!';
                statusMsg.style.color = '#6fcf97';
                statusMsg.style.display = 'block';
                setTimeout(() => {
                    fileInput.value = '';
                    fileName.textContent = 'No file chosen';
                    progressContainer.style.display = 'none';
                    statusMsg.style.display = 'none';
                }, 4000);
            } else {
                statusMsg.textContent = '❌ Upload failed: ' + xhr.status;
                statusMsg.style.color = '#e74c3c';
                statusMsg.style.display = 'block';
            }
        };

        xhr.onerror = function() {
            clearInterval(speedInterval);
            uploadBtn.disabled = false;
            statusMsg.textContent = '❌ Network error. Please try again.';
            statusMsg.style.color = '#e74c3c';
            statusMsg.style.display = 'block';
        };

        xhr.send(formData);
    });
</script>
</body>
</html>
